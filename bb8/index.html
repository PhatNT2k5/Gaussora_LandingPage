<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BB-8 Interactive Robot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            overflow: hidden;
            background: #070b14;
            font-family: 'Rajdhani', sans-serif;
            cursor: none;
        }

        #webgl-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* Custom cursor */
        #cursor {
            position: fixed;
            width: 20px; height: 20px;
            border: 2px solid rgba(255, 165, 50, 0.8);
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s, border-color 0.2s;
            mix-blend-mode: difference;
        }
        #cursor-dot {
            position: fixed;
            width: 4px; height: 4px;
            background: rgba(255, 165, 50, 1);
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            transform: translate(-50%, -50%);
        }

        /* UI Overlay */
        .ui-overlay {
            position: absolute;
            z-index: 10;
            pointer-events: none;
            width: 100%; height: 100%;
        }

        /* Top bar */
        .top-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(7,11,20,0.9) 0%, transparent 100%);
        }
        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            font-weight: 900;
            letter-spacing: 6px;
            color: #fff;
            text-transform: uppercase;
        }
        .logo span {
            color: #ff9500;
        }
        .top-status {
            display: flex;
            gap: 24px;
            align-items: center;
        }
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
        }
        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #00ff88;
            box-shadow: 0 0 8px #00ff88;
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Center content */
        .center-content {
            position: absolute;
            top: 50%;
            left: 10%;
            transform: translateY(-50%);
            max-width: 480px;
        }
        .subtitle {
            font-size: 0.7rem;
            letter-spacing: 5px;
            color: #ff9500;
            text-transform: uppercase;
            margin-bottom: 16px;
            opacity: 0;
            animation: fadeInUp 1s ease 0.5s forwards;
        }
        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            font-weight: 900;
            color: #fff;
            line-height: 1.1;
            opacity: 0;
            animation: fadeInUp 1s ease 0.7s forwards;
        }
        .main-title .highlight {
            display: block;
            background: linear-gradient(135deg, #ff9500, #ffcc44);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .description {
            margin-top: 20px;
            font-size: 1rem;
            line-height: 1.7;
            color: rgba(255,255,255,0.5);
            opacity: 0;
            animation: fadeInUp 1s ease 0.9s forwards;
        }
        .cta-row {
            margin-top: 36px;
            display: flex;
            gap: 16px;
            opacity: 0;
            animation: fadeInUp 1s ease 1.1s forwards;
            pointer-events: all;
        }
        .btn-primary {
            padding: 14px 32px;
            background: linear-gradient(135deg, #ff9500, #ff6b00);
            border: none;
            border-radius: 4px;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(255, 149, 0, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 50px rgba(255, 149, 0, 0.5);
        }
        .btn-outline {
            padding: 14px 32px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 4px;
            color: rgba(255,255,255,0.7);
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-outline:hover {
            border-color: rgba(255,149,0,0.5);
            color: #ff9500;
        }

        /* Bottom HUD */
        .hud-bottom {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            background: linear-gradient(to top, rgba(7,11,20,0.9) 0%, transparent 100%);
        }
        .hud-data {
            display: flex;
            gap: 40px;
        }
        .hud-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .hud-label {
            font-size: 0.65rem;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
        }
        .hud-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            color: #ff9500;
        }
        .hud-scan {
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
        }

        /* Corner decorations */
        .corner {
            position: absolute;
            width: 40px;
            height: 40px;
        }
        .corner-tl {
            top: 16px; left: 16px;
            border-top: 2px solid rgba(255,149,0,0.4);
            border-left: 2px solid rgba(255,149,0,0.4);
        }
        .corner-tr {
            top: 16px; right: 16px;
            border-top: 2px solid rgba(255,149,0,0.4);
            border-right: 2px solid rgba(255,149,0,0.4);
        }
        .corner-bl {
            bottom: 16px; left: 16px;
            border-bottom: 2px solid rgba(255,149,0,0.4);
            border-left: 2px solid rgba(255,149,0,0.4);
        }
        .corner-br {
            bottom: 16px; right: 16px;
            border-bottom: 2px solid rgba(255,149,0,0.4);
            border-right: 2px solid rgba(255,149,0,0.4);
        }

        /* Scan line effect */
        .scanline {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 2px;
            background: linear-gradient(to right, transparent, rgba(255,149,0,0.1), transparent);
            animation: scanline 6s linear infinite;
            pointer-events: none;
            z-index: 5;
        }
        @keyframes scanline {
            0% { top: -2px; }
            100% { top: 100%; }
        }

        /* Loading screen */
        #loading {
            position: fixed;
            inset: 0;
            background: #070b14;
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 24px;
            transition: opacity 0.8s ease;
        }
        .loading-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 8px;
            color: #fff;
        }
        .loading-logo span { color: #ff9500; }
        .loading-bar-outer {
            width: 300px;
            height: 2px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        .loading-bar-inner {
            height: 100%;
            background: linear-gradient(to right, #ff6b00, #ff9500);
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px #ff9500;
        }
        .loading-text {
            font-size: 0.7rem;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Vignette */
        .vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(7,11,20,0.7) 100%);
            pointer-events: none;
            z-index: 3;
        }
        /* ── SPEECH BUBBLE ──────────────────────────────────── */
        #speech-bubble {
            position: fixed;
            z-index: 20;
            pointer-events: none;
            transform: translate(-50%, -100%);
            margin-top: -24px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        #speech-bubble.visible {
            opacity: 1;
        }
        .bubble-box {
            background: rgba(10, 18, 35, 0.92);
            border: 1px solid rgba(255, 149, 0, 0.5);
            border-radius: 12px;
            padding: 10px 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 24px rgba(255, 149, 0, 0.25), 0 4px 20px rgba(0,0,0,0.6);
            position: relative;
            white-space: nowrap;
            animation: bubble-pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }
        .bubble-box::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid rgba(255, 149, 0, 0.5);
        }
        .bubble-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #ff9500;
            text-transform: uppercase;
        }
        @keyframes bubble-pop {
            0%   { transform: scale(0.5); opacity: 0; }
            70%  { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading">
        <div class="loading-logo">GAUSS<span>ORA</span></div>
        <div class="loading-bar-outer">
            <div class="loading-bar-inner" id="loading-bar"></div>
        </div>
        <div class="loading-text" id="loading-text">Initializing systems...</div>
    </div>

    <!-- Speech Bubble -->
    <div id="speech-bubble">
        <div class="bubble-box">
            <div class="bubble-text" id="bubble-text">Beep boop!</div>
        </div>
    </div>

    <!-- Custom Cursor -->
    <div id="cursor"></div>
    <div id="cursor-dot"></div>

    <!-- 3D Canvas -->
    <div id="webgl-container"></div>

    <!-- Vignette overlay -->
    <div class="vignette"></div>

    <!-- Scan line -->
    <div class="scanline"></div>

    <!-- UI Overlay -->
    <div class="ui-overlay">
        <!-- Corner decorations -->
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>

        <!-- Top Bar -->
        <div class="top-bar">
            <div class="logo">BB<span>-8</span></div>
            <div class="top-status">
                <div class="status-indicator">
                    <div class="status-dot"></div>
                    <span>System Online</span>
                </div>
                <div class="status-indicator">
                    <span>Unit R2-BB8</span>
                </div>
            </div>
        </div>

        <!-- Center Content -->
        <div class="center-content">
            <div class="subtitle">Interactive AI Robot</div>
            <div class="main-title">
                Meet <span class="highlight">BB-8</span>
            </div>
            <p class="description">
                Hover your mouse to interact with BB-8.<br>
                Watch as the robot tracks and follows your cursor across the environment.
            </p>
            <div class="cta-row">
                <button class="btn-primary" id="btn-interact">Interact Now</button>
                <button class="btn-outline" id="btn-info">Learn More</button>
            </div>
        </div>

        <!-- Bottom HUD -->
        <div class="hud-bottom">
            <div class="hud-data">
                <div class="hud-item">
                    <div class="hud-label">Unit</div>
                    <div class="hud-value">BB-8</div>
                </div>
                <div class="hud-item">
                    <div class="hud-label">Status</div>
                    <div class="hud-value" id="hud-status">TRACKING</div>
                </div>
                <div class="hud-item">
                    <div class="hud-label">Energy</div>
                    <div class="hud-value">98.7%</div>
                </div>
            </div>
            <div class="hud-scan" id="hud-coords">COORD: 0.00 / 0.00</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="main.js"></script>
</body>
</html>
